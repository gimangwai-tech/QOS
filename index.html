<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network QoS Calculator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f7f3ef;
  margin: 0;
  padding: 20px;
}

h1 { text-align:center; margin-bottom:5px; }
.subtitle { text-align:center; color:#777; margin-bottom:20px; }

.container { max-width:1000px; margin:auto; }

.badge {
  background:#f3d7c1; padding:3px 8px; border-radius:8px; font-size:12px;
}

.upload-box {
  border:2px dashed #d8b89c;
  border-radius:12px;
  padding:30px;
  text-align:center;
  background:#fff;
  margin-bottom:15px;
  transition:0.3s;
}

.upload-box.dragover { border-color: orange; background:#fff8f2; }

.cards {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h3 { margin-top:0; }

input {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:1px solid #ccc;
}

button {
  width:100%; padding:10px;
  border:none; border-radius:8px;
  color:white; cursor:pointer;
}

.blue { background:#1f5f8b; }
.green { background:#2e7d32; }
.orange { background:#c45a1a; }
.red { background:#8e244d; }

.result { margin-top:10px; font-weight:bold; }

.toggle { text-align:right; margin:10px 0; }

</style>
</head>

<body>

<div class="container">
  <h1>Network QoS Calculator</h1>
  <div class="subtitle">Wireshark QoS Analysis (Auto)</div>

  <p><b>Import dari Wireshark CSV</b> <span class="badge">OPTIONAL</span></p>

  <div class="upload-box" id="dropArea">
    <p>📂 Drag & drop file CSV dari Wireshark</p>
    <button onclick="fileInput.click()">Pilih File CSV</button>
    <input type="file" id="fileInput" hidden>
  </div>

  <div class="toggle">
    Tampilkan Kategori TIPHON <input type="checkbox" id="tiphonToggle" checked>
  </div>

  <div class="cards">

    <div class="card">
      <h3>Delay</h3>
      <input id="delayVal" readonly>
      <div class="result" id="delayResult"></div>
    </div>

    <div class="card">
      <h3>Jitter</h3>
      <input id="jitterVal" readonly>
      <div class="result" id="jitterResult"></div>
    </div>

    <div class="card">
      <h3>Throughput</h3>
      <input id="throughputVal" readonly>
      <div class="result" id="throughputResult"></div>
    </div>

    <div class="card">
      <h3>Packet Loss</h3>
      <input id="lossVal" readonly>
      <div class="result" id="lossResult"></div>
    </div>

  </div>
</div>

<script>
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropArea.addEventListener('dragover', e => {
  e.preventDefault();
  dropArea.classList.add('dragover');
});

dropArea.addEventListener('dragleave', () => {
  dropArea.classList.remove('dragover');
});

dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(file){
  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result);
  reader.readAsText(file);
}

function parseCSV(text){
  const lines = text.split('\n');
  let times = [];
  let totalBytes = 0;

  for(let i=1;i<lines.length;i++){
    let cols = lines[i].split(',');

    let time = parseFloat(cols[1]);
    let len = parseFloat(cols[5]);

    if(!isNaN(time)) times.push(time);
    if(!isNaN(len)) totalBytes += len;
  }

  // Delay
  let delay = times.reduce((a,b)=>a+b,0) / times.length;

  // Jitter
  let jitter = 0;
  for(let i=1;i<times.length;i++){
    jitter += Math.abs(times[i] - times[i-1]);
  }
  jitter = jitter / (times.length-1);

  // Throughput
  let duration = Math.max(...times) - Math.min(...times);
  let throughput = (totalBytes * 8) / duration;

  // Packet Loss (dummy estimasi)
  let expected = times.length + 10;
  let loss = ((expected - times.length) / expected) * 100;

  // Output
  delayVal.value = delay.toFixed(6);
  jitterVal.value = jitter.toFixed(6);
  throughputVal.value = throughput.toFixed(2);
  lossVal.value = loss.toFixed(2);

  delayResult.innerText = "Delay: " + delay.toFixed(6);
  jitterResult.innerText = "Jitter: " + jitter.toFixed(6);
  throughputResult.innerText = "Throughput: " + throughput.toFixed(2) + " bps";
  lossResult.innerText = "Packet Loss: " + loss.toFixed(2) + "%";
}
</script>

</body>
</html>
