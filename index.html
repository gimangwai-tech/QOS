<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Network QoS Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    h1 { text-align:center; }
    .container { max-width:900px; margin:auto; }
    .card {
      background:white; padding:20px; margin:10px 0;
      border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }
    input { width:100%; padding:8px; margin:5px 0; }
    button {
      padding:10px; width:100%; border:none; border-radius:5px;
      background:#007bff; color:white; cursor:pointer;
    }
    .result { margin-top:10px; font-weight:bold; }
  </style>
</head>
<body>

<div class="container">
  <h1>Network QoS Calculator</h1>

  <!-- Delay -->
  <div class="card">
    <h3>Delay</h3>
    <input id="totalDelay" placeholder="Total Delay (detik)">
    <input id="jumlahPaket" placeholder="Jumlah Paket">
    <button onclick="hitungDelay()">Hitung Delay</button>
    <div class="result" id="hasilDelay"></div>
  </div>

  <!-- Jitter -->
  <div class="card">
    <h3>Jitter</h3>
    <input id="totalJitter" placeholder="Total Jitter">
    <input id="paketJitter" placeholder="Jumlah Paket">
    <button onclick="hitungJitter()">Hitung Jitter</button>
    <div class="result" id="hasilJitter"></div>
  </div>

  <!-- Throughput -->
  <div class="card">
    <h3>Throughput</h3>
    <input id="totalBytes" placeholder="Total Bytes">
    <input id="timeSpan" placeholder="Time Span (detik)">
    <button onclick="hitungThroughput()">Hitung Throughput</button>
    <div class="result" id="hasilThroughput"></div>
  </div>

  <!-- Packet Loss -->
  <div class="card">
    <h3>Packet Loss</h3>
    <input id="paketKirim" placeholder="Paket Terkirim">
    <input id="paketHilang" placeholder="Paket Hilang">
    <button onclick="hitungPacketLoss()">Hitung Packet Loss</button>
    <div class="result" id="hasilPacketLoss"></div>
  </div>

</div>

<script>
function hitungDelay() {
  let total = parseFloat(document.getElementById('totalDelay').value);
  let paket = parseFloat(document.getElementById('jumlahPaket').value);
  let hasil = total / paket;
  document.getElementById('hasilDelay').innerText = "Delay: " + hasil.toFixed(6) + " detik";
}

function hitungJitter() {
  let total = parseFloat(document.getElementById('totalJitter').value);
  let paket = parseFloat(document.getElementById('paketJitter').value);
  let hasil = total / paket;
  document.getElementById('hasilJitter').innerText = "Jitter: " + hasil.toFixed(6);
}

function hitungThroughput() {
  let bytes = parseFloat(document.getElementById('totalBytes').value);
  let time = parseFloat(document.getElementById('timeSpan').value);
  let hasil = (bytes * 8) / time;
  document.getElementById('hasilThroughput').innerText = "Throughput: " + hasil.toFixed(2) + " bps";
}

function hitungPacketLoss() {
  let kirim = parseFloat(document.getElementById('paketKirim').value);
  let hilang = parseFloat(document.getElementById('paketHilang').value);
  let hasil = (hilang / kirim) * 100;
  document.getElementById('hasilPacketLoss').innerText = "Packet Loss: " + hasil.toFixed(2) + "%";
}
</script>

</body>
</html>
