<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network QoS Calculator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f7f3ef;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  font-weight: bold;
}

.subtitle {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.upload-box {
  border: 2px dashed #d8b89c;
  border-radius: 10px;
  padding: 30px;
  text-align: center;
  background: #fff;
  margin-bottom: 20px;
}

.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
  margin-top: 0;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.blue { background: #1f5f8b; }
.green { background: #2e7d32; }
.orange { background: #c45a1a; }
.red { background: #8e244d; }

.result {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>Network QoS Calculator</h1>
  <div class="subtitle">Hitung Throughput, Delay, Jitter, dan Packet Loss</div>

  <div class="upload-box">
    <p><b>Import dari Wireshark CSV (Opsional)</b></p>
    <input type="file" id="csvFile">
  </div>

  <div class="cards">

    <div class="card">
      <h3>Delay</h3>
      <input id="totalDelay" placeholder="Total Delay (detik)">
      <input id="jumlahPaket" placeholder="Jumlah Paket">
      <button class="blue" onclick="hitungDelay()">Hitung Delay</button>
      <div class="result" id="hasilDelay"></div>
    </div>

    <div class="card">
      <h3>Jitter</h3>
      <input id="totalJitter" placeholder="Total Jitter">
      <input id="paketJitter" placeholder="Jumlah Paket">
      <button class="green" onclick="hitungJitter()">Hitung Jitter</button>
      <div class="result" id="hasilJitter"></div>
    </div>

    <div class="card">
      <h3>Throughput</h3>
      <input id="totalBytes" placeholder="Total Bytes">
      <input id="timeSpan" placeholder="Time Span (detik)">
      <button class="orange" onclick="hitungThroughput()">Hitung Throughput</button>
      <div class="result" id="hasilThroughput"></div>
    </div>

    <div class="card">
      <h3>Packet Loss</h3>
      <input id="paketKirim" placeholder="Paket Terkirim">
      <input id="paketHilang" placeholder="Paket Hilang">
      <button class="red" onclick="hitungPacketLoss()">Hitung Packet Loss</button>
      <div class="result" id="hasilPacketLoss"></div>
    </div>

  </div>
</div>

<script>
function hitungDelay() {
  let total = parseFloat(totalDelay.value);
  let paket = parseFloat(jumlahPaket.value);
  hasilDelay.innerText = "Delay: " + (total/paket).toFixed(6) + " detik";
}

function hitungJitter() {
  let total = parseFloat(totalJitter.value);
  let paket = parseFloat(paketJitter.value);
  hasilJitter.innerText = "Jitter: " + (total/paket).toFixed(6);
}

function hitungThroughput() {
  let bytes = parseFloat(totalBytes.value);
  let time = parseFloat(timeSpan.value);
  hasilThroughput.innerText = "Throughput: " + ((bytes*8)/time).toFixed(2) + " bps";
}

function hitungPacketLoss() {
  let kirim = parseFloat(paketKirim.value);
  let hilang = parseFloat(paketHilang.value);
  hasilPacketLoss.innerText = "Packet Loss: " + ((hilang/kirim)*100).toFixed(2) + "%";
}

// CSV Parser sederhana (Wireshark)
document.getElementById('csvFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;
    alert("CSV berhasil di-load (fitur parsing bisa dikembangkan lanjut)");
  };

  reader.readAsText(file);
});
</script>

</body>
</html>
